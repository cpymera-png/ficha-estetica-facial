<style>
  /* Panel-specific styles */
  .panel-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    flex-wrap: wrap;
  }
  .panel-nav a {
    color: var(--color-text-inverse);
    text-decoration: none;
    font-size: var(--text-sm);
    font-weight: 600;
    padding: var(--space-2) var(--space-4);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: var(--radius-lg);
    transition: all var(--transition-interactive);
  }
  .panel-nav a:hover { background: rgba(255,255,255,0.15); }

  .search-bar {
    display: flex;
    gap: var(--space-3);
    margin-bottom: var(--space-5);
  }
  .search-bar input {
    flex: 1;
    padding: var(--space-3) var(--space-4);
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: var(--text-base);
    background: var(--color-surface);
  }
  .search-bar input:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-light);
  }
  .search-bar button {
    padding: var(--space-3) var(--space-6);
    background: var(--color-primary);
    color: white;
    font-weight: 600;
    font-size: var(--text-sm);
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    min-height: 48px;
  }

  .stats-bar {
    display: flex;
    gap: var(--space-3);
    margin-bottom: var(--space-4);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
  }
  .stats-bar strong {
    color: var(--color-primary);
  }

  .fichas-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  .ficha-card {
    background: var(--color-surface);
    border: 1px solid var(--color-divider);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-5);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: var(--space-3);
    align-items: center;
    transition: all var(--transition-interactive);
    cursor: pointer;
  }
  .ficha-card:hover {
    border-color: var(--color-primary);
    box-shadow: var(--shadow-md);
  }

  .ficha-info h3 {
    font-family: var(--font-body);
    font-size: var(--text-base);
    font-weight: 600;
    margin-bottom: var(--space-1);
  }
  .ficha-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2) var(--space-4);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }
  .ficha-meta span { white-space: nowrap; }

  .ficha-actions {
    display: flex;
    gap: var(--space-2);
  }
  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--color-divider);
    background: var(--color-surface-2);
    cursor: pointer;
    transition: all var(--transition-interactive);
    color: var(--color-text-muted);
  }
  .btn-icon:hover { background: var(--color-surface-offset); color: var(--color-text); }
  .btn-icon.danger:hover { background: #fde8e8; color: var(--color-error); border-color: var(--color-error); }

  .empty-state {
    text-align: center;
    padding: var(--space-12) var(--space-4);
    color: var(--color-text-faint);
  }
  .empty-state svg { margin: 0 auto var(--space-4); opacity: 0.4; }
  .empty-state p { font-size: var(--text-sm); }

  .loading { text-align: center; padding: var(--space-8); color: var(--color-text-muted); }

  /* Detail modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: var(--space-4);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--color-surface);
    border-radius: var(--radius-xl);
    max-width: 700px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: var(--space-6);
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-4);
    padding-bottom: var(--space-3);
    border-bottom: 2px solid var(--color-primary-light);
  }
  .modal-header h2 {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: 600;
  }
  .modal-close {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none; background: var(--color-surface-offset);
    cursor: pointer; font-size: 18px; color: var(--color-text-muted);
    display: flex; align-items: center; justify-content: center;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: var(--space-1) var(--space-3);
    font-size: var(--text-sm);
    margin-bottom: var(--space-4);
  }
  .detail-grid dt {
    font-weight: 600;
    color: var(--color-text-muted);
    padding: var(--space-1) 0;
  }
  .detail-grid dd {
    padding: var(--space-1) 0;
    word-break: break-word;
  }
  .detail-section {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: var(--text-base);
    color: var(--color-primary);
    margin: var(--space-4) 0 var(--space-2);
    padding-top: var(--space-3);
    border-top: 1px solid var(--color-divider);
  }
  .sig-preview { max-width: 250px; border: 1px solid var(--color-divider); border-radius: var(--radius-md); margin-top: var(--space-1); }
  .photo-preview-modal { max-width: 100%; border-radius: var(--radius-md); margin-top: var(--space-2); }

<body>

<header class="form-header">
  <div class="header-inner panel-nav">
    <div class="logo-area">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Logo">
        <circle cx="20" cy="16" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14 14c0 0 2 4 6 4s6-4 6-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M16 12.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2zM24 12.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z" fill="currentColor"/>
        <path d="M20 26v6M16 38c0-4 2-6 4-6s4 2 4 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div>
        <h1 class="header-title">Fichas Guardadas</h1>
        <p class="header-subtitle">Consulta de Historias Clínicas</p>
      </div>
    </div>
    <a href="./index.html">+ Nueva Ficha</a>
  </div>
</header>

<main class="form-container">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar por nombre, cosmiatra o DNI...">
    <button onclick="buscarFichas()">Buscar</button>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="fichas-list" id="fichasList">
    <div class="loading">Cargando fichas...</div>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Detalle de Ficha</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<footer class="form-footer">
  <p>&copy; Massiel Daniela Ruiz Otairo — Historia Clínica Estética Facial</p>
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</footer>

<script>
(function() {
  'use strict';

  const API = './api';

  // Load fichas on page load
  cargarFichas();

  // Search on Enter key
  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') buscarFichas();
  });

  window.buscarFichas = function() {
    const query = document.getElementById('searchInput').value.trim();
    cargarFichas(query);
  };

  async function cargarFichas(buscar) {
    const list = document.getElementById('fichasList');
    const stats = document.getElementById('statsBar');
    list.innerHTML = '<div class="loading">Cargando fichas...</div>';

    try {
      let url = `${API}/listar.php`;
      if (buscar) url += `?buscar=${encodeURIComponent(buscar)}`;

      const res = await fetch(url);
      const data = await res.json();

      stats.innerHTML = `<span>Total: <strong>${data.total}</strong> fichas</span>`;

      if (data.fichas.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <p>No se encontraron fichas${buscar ? ' para "' + buscar + '"' : ''}.</p>
          </div>`;
        return;
      }

      list.innerHTML = data.fichas.map(f => `
        <div class="ficha-card" onclick="verDetalle(${f.id})">
          <div class="ficha-info">
            <h3>${f.apellido_nombre || 'Sin nombre'}</h3>
            <div class="ficha-meta">
              <span>#${f.id}</span>
              <span>${f.fecha_ingreso || f.created_at?.split(' ')[0] || ''}</span>
              ${f.cosmiatra ? `<span>Cosmiatra: ${f.cosmiatra}</span>` : ''}
              ${f.edad ? `<span>${f.edad} años</span>` : ''}
              ${f.telefono ? `<span>Tel: ${f.telefono}</span>` : ''}
              ${f.biotipo ? `<span>Biotipo: ${f.biotipo}</span>` : ''}
            </div>
          </div>
          <div class="ficha-actions">
            <button class="btn-icon danger" onclick="event.stopPropagation(); eliminarFicha(${f.id}, '${(f.apellido_nombre || '').replace(/'/g, ''')}')" title="Eliminar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
      `).join('');

    } catch (err) {
      list.innerHTML = `<div class="empty-state"><p>Error al conectar con la base de datos.<br>Verifica que la configuración en api/config.php sea correcta.</p></div>`;
      stats.innerHTML = '';
    }
  }

  window.verDetalle = async function(id) {
    const overlay = document.getElementById('modalOverlay');
    const body = document.getElementById('modalBody');
    const title = document.getElementById('modalTitle');
    body.innerHTML = '<div class="loading">Cargando...</div>';
    overlay.classList.add('active');

    try {
      const res = await fetch(`${API}/listar.php?id=${id}`);
      const f = await res.json();

      title.textContent = `Ficha #${f.id} — ${f.apellido_nombre || 'Sin nombre'}`;

      let html = '';

      // Datos personales
      html += `<p class="detail-section">Datos Personales</p>`;
      html += `<dl class="detail-grid">`;
      const personales = [
        ['Cosmiatra', f.cosmiatra], ['Fecha ingreso', f.fecha_ingreso],
        ['Nombre', f.apellido_nombre], ['Domicilio', f.domicilio],
        ['Nacimiento', f.fecha_nacimiento], ['Edad', f.edad],
        ['Ocupación', f.ocupacion], ['Hijos', f.hijos],
        ['Teléfono', f.telefono], ['Biotipo', f.biotipo],
        ['Condición', f.condicion]
      ];
      personales.forEach(([l, v]) => { if (v) html += `<dt>${l}</dt><dd>${v}</dd>`; });
      html += `</dl>`;

      // Motivo
      if (f.motivo_consulta) {
        html += `<p class="detail-section">Motivo de la Consulta</p>`;
        html += `<p style="font-size:var(--text-sm)">${f.motivo_consulta}</p>`;
      }

      // Diagnóstico
      if (f.diagnostico) {
        html += `<p class="detail-section">Diagnóstico</p>`;
        html += `<p style="font-size:var(--text-sm)">${f.diagnostico}</p>`;
      }

      // Tratamiento
      if (f.tratamiento) {
        html += `<p class="detail-section">Tratamiento</p>`;
        html += `<p style="font-size:var(--text-sm)">${f.tratamiento}</p>`;
      }

      // Firmas
      if (f.firma_paciente || f.firma_cosmiatra) {
        html += `<p class="detail-section">Firmas</p>`;
        html += `<div style="display:flex;gap:var(--space-4);flex-wrap:wrap">`;
        if (f.firma_paciente) html += `<div><p style="font-size:var(--text-xs);font-weight:600;margin-bottom:var(--space-1)">Paciente</p><img class="sig-preview" src="${f.firma_paciente}" alt="Firma paciente"></div>`;
        if (f.firma_cosmiatra) html += `<div><p style="font-size:var(--text-xs);font-weight:600;margin-bottom:var(--space-1)">Cosmiatra</p><img class="sig-preview" src="${f.firma_cosmiatra}" alt="Firma cosmiatra"></div>`;
        html += `</div>`;
      }

      // Fotos
      if (f.foto_antes || f.foto_despues) {
        html += `<p class="detail-section">Fotos</p>`;
        html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)">`;
        if (f.foto_antes) html += `<div><p style="font-size:var(--text-xs);font-weight:600">Antes</p><img class="photo-preview-modal" src="${f.foto_antes}" alt="Antes"></div>`;
        if (f.foto_despues) html += `<div><p style="font-size:var(--text-xs);font-weight:600">Después</p><img class="photo-preview-modal" src="${f.foto_despues}" alt="Después"></div>`;
        html += `</div>`;
      }

      body.innerHTML = html;
    } catch (err) {
      body.innerHTML = '<p>Error al cargar la ficha.</p>';
    }
  };

  window.closeModal = function() {
    document.getElementById('modalOverlay').classList.remove('active');
  };

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  window.eliminarFicha = async function(id, nombre) {
    if (!confirm(`¿Eliminar la ficha de "${nombre}"? Esta acción no se puede deshacer.`)) return;

    try {
      const res = await fetch(`${API}/eliminar.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      const result = await res.json();
      if (result.success) {
        cargarFichas();
      }
    } catch (err) {
      alert('Error al eliminar la ficha.');
    }
  };

})();
</script>
</body>
</html>
